name: Convert Slides to PPTX

on:
  workflow_dispatch:
    inputs:
      input_file:
        description: 'ชื่อไฟล์ PDF หรือรูปภาพ (ต้องอัปโหลดเข้า repo ไว้ก่อน เช่น sample.pdf)'
        required: true
        default: 'sample.pdf'

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies (Poppler)
      run: sudo apt-get update && sudo apt-get install -y poppler-utils

    - name: Install Python Dependencies
      run: pip install -r requirements.txt

    - name: Run Converter
      run: python main_cli.py --input "${{ github.event.inputs.input_file }}" --output "output.pptx"

    - name: Upload PPTX Result
      uses: actions/upload-artifact@v4
      with:
        name: Converted-PPTX
        path: output.pptx